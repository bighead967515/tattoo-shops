services:
  - type: web
    name: inkconnect
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack prepare pnpm@10.27.0 --activate && pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    # All environment variables are managed via the Render dashboard / API.
    # See API_KEYS_CHECKLIST.md for the full list of required vars.
