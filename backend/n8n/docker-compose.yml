version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=inkconnect-local
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      # Copy your real values into .env.n8n (never commit that file)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - APP_BASE_URL=${APP_BASE_URL:-https://inkconnect.app}
      - ADMIN_ALERT_EMAIL=${ADMIN_ALERT_EMAIL}
      - STRIPE_PRICE_ID_ARTIST_AMATEUR=${STRIPE_PRICE_ID_ARTIST_AMATEUR}
      - STRIPE_PRICE_ID_ARTIST_ICON=${STRIPE_PRICE_ID_ARTIST_ICON}
    volumes:
      - n8n_data:/home/node/.n8n
    env_file:
      - .env.n8n

volumes:
  n8n_data:
