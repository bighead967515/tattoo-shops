# LEGACY VM FILE (DEPRECATED for Render + IONOS DNS-only deployments)
# Place at /etc/nginx/sites-available/theinkednetwork.website only if you intentionally
# run nginx on a VM/reverse-proxy host. For Render-hosted production, this file should
# not be used because it assumes a local backend on 127.0.0.1:3000.
#
# Requires variables to be rendered from cutover.env values.
# NOTE: If you are DNS-only on IONOS and app-hosted on Render, archive/remove this file
# from the active runbook to avoid accidental use during cutover.

server {
    listen 80;
    listen [::]:80;
    server_name theinkednetwork.website www.theinkednetwork.website;

    return 301 https://theinkednetwork.website$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name theinkednetwork.website www.theinkednetwork.website;

    # Replace with your certificate paths.
    ssl_certificate /etc/letsencrypt/live/theinkednetwork.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theinkednetwork.website/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:3000/api/health;
        access_log off;
    }
}
