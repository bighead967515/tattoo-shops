<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Find and book the best tattoo artists near you. Browse portfolios, read reviews, and schedule appointments with top-rated tattoo shops."
    />
    <meta
      name="keywords"
      content="tattoo, tattoo artist, tattoo shop, tattoo booking, tattoo portfolio, find tattoo artist"
    />
    <meta name="author" content="Universal Inc" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />

      property="og:title"
      content="Universal Inc - Tattoo Artist Directory"
    />

      property="og:description"
      content="Find and book the best tattoo artists near you. Browse portfolios, read reviews, and schedule appointments."
    />

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:title"
      content="Universal Inc - Tattoo Artist Directory"
    />
    <meta
      name="twitter:description"
      content="Find and book the best tattoo artists near you."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#1a1a2e" />

    <title>Universal Inc - Tattoo Artist Directory</title>

    <!-- Cyberpunk Fonts: Orbitron (headings) + Rajdhani (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"

    />
  </head>
