name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      JWT_SECRET: test_jwt_secret_abcdefghijklmnopqrstuvwxyz123456
      DATABASE_URL: https://example.com/db
      OWNER_OPEN_ID: owner_test
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      # Artist subscription Stripe Price IDs — test placeholders so env.ts validation passes
      STRIPE_ARTIST_AMATEUR_PRICE_ID_MONTH: price_test_amateur_month
      STRIPE_ARTIST_AMATEUR_PRICE_ID_YEAR: price_test_amateur_year
      STRIPE_ARTIST_PRO_PRICE_ID_MONTH: price_test_pro_month
      STRIPE_ARTIST_PRO_PRICE_ID_YEAR: price_test_pro_year
      STRIPE_ARTIST_ICON_PRICE_ID_MONTH: price_test_icon_month
      STRIPE_ARTIST_ICON_PRICE_ID_YEAR: price_test_icon_year
      STRIPE_FOUNDING_ARTIST_PRICE_ID: price_test_founding
      RESEND_API_KEY: re_test_placeholder
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_KEY: service_key_placeholder
      SUPABASE_ANON_KEY: anon_key_placeholder
      GROQ_API_KEY: groq_test_placeholder
      HUGGINGFACE_API_KEY: hf_test_placeholder
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b74ab04b0346b9e454d30fac55e74e9e0dc6 # v4.0.0
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: false

      - name: Type check
        run: pnpm check

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build
