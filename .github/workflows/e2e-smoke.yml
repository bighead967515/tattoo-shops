name: E2E Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 4:00 AM UTC nightly on main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OWNER_OPEN_ID: ${{ secrets.OWNER_OPEN_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_ARTIST_AMATEUR_PRICE_ID_MONTH: ${{ secrets.STRIPE_ARTIST_AMATEUR_PRICE_ID_MONTH }}
      STRIPE_ARTIST_AMATEUR_PRICE_ID_YEAR: ${{ secrets.STRIPE_ARTIST_AMATEUR_PRICE_ID_YEAR }}
      STRIPE_ARTIST_PRO_PRICE_ID_MONTH: ${{ secrets.STRIPE_ARTIST_PRO_PRICE_ID_MONTH }}
      STRIPE_ARTIST_PRO_PRICE_ID_YEAR: ${{ secrets.STRIPE_ARTIST_PRO_PRICE_ID_YEAR }}
      STRIPE_ARTIST_ICON_PRICE_ID_MONTH: ${{ secrets.STRIPE_ARTIST_ICON_PRICE_ID_MONTH }}
      STRIPE_ARTIST_ICON_PRICE_ID_YEAR: ${{ secrets.STRIPE_ARTIST_ICON_PRICE_ID_YEAR }}
      STRIPE_FOUNDING_ARTIST_PRICE_ID: ${{ secrets.STRIPE_FOUNDING_ARTIST_PRICE_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate required secrets
        shell: bash
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OWNER_OPEN_ID: ${{ secrets.OWNER_OPEN_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_ARTIST_AMATEUR_PRICE_ID_MONTH: ${{ secrets.STRIPE_ARTIST_AMATEUR_PRICE_ID_MONTH }}
          STRIPE_ARTIST_AMATEUR_PRICE_ID_YEAR: ${{ secrets.STRIPE_ARTIST_AMATEUR_PRICE_ID_YEAR }}
          STRIPE_ARTIST_PRO_PRICE_ID_MONTH: ${{ secrets.STRIPE_ARTIST_PRO_PRICE_ID_MONTH }}
          STRIPE_ARTIST_PRO_PRICE_ID_YEAR: ${{ secrets.STRIPE_ARTIST_PRO_PRICE_ID_YEAR }}
          STRIPE_ARTIST_ICON_PRICE_ID_MONTH: ${{ secrets.STRIPE_ARTIST_ICON_PRICE_ID_MONTH }}
          STRIPE_ARTIST_ICON_PRICE_ID_YEAR: ${{ secrets.STRIPE_ARTIST_ICON_PRICE_ID_YEAR }}
          STRIPE_FOUNDING_ARTIST_PRICE_ID: ${{ secrets.STRIPE_FOUNDING_ARTIST_PRICE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          required=(
            JWT_SECRET
            DATABASE_URL
            OWNER_OPEN_ID
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            STRIPE_ARTIST_AMATEUR_PRICE_ID_MONTH
            STRIPE_ARTIST_AMATEUR_PRICE_ID_YEAR
            STRIPE_ARTIST_PRO_PRICE_ID_MONTH
            STRIPE_ARTIST_PRO_PRICE_ID_YEAR
            STRIPE_ARTIST_ICON_PRICE_ID_MONTH
            STRIPE_ARTIST_ICON_PRICE_ID_YEAR
            STRIPE_FOUNDING_ARTIST_PRICE_ID
            RESEND_API_KEY
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            SUPABASE_ANON_KEY
            GROQ_API_KEY
            HUGGINGFACE_API_KEY
          )

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Required secrets are missing. Aborting E2E smoke run."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b74ab04b0346b9e454d30fac55e74e9e0dc6 # v4.0.0
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Run E2E smoke journeys
        run: pnpm test:e2e -- tests/e2e/journeys.spec.ts tests/e2e/request-bid-acceptance.spec.ts
